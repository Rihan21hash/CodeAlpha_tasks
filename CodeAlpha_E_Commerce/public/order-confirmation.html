<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — NexShop</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .confirmation-hero { text-align:center; padding:3rem 0 2rem; }
    .checkmark-circle {
      width:90px; height:90px;
      background:var(--grad-success);
      border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:36px; font-weight:700; color:white;
      margin:0 auto 1.5rem;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes popIn { from { transform:scale(0); opacity:0; } to { transform:scale(1); opacity:1; } }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon" style="font-size:14px;font-weight:700">NX</div>
      <span class="logo-text">Nex<span class="logo-accent">Shop</span></span>
    </a>
    <div class="nav-links">
      <div id="nav-auth-area" style="display:flex;align-items:center;gap:0.5rem"></div>
    </div>
  </div>
</nav>

<div class="page-wrapper">
  <div class="container" style="max-width:640px;padding-top:3rem;padding-bottom:4rem">

    <div class="confirmation-hero">
      <div class="checkmark-circle">&#10003;</div>
      <h1 style="font-size:var(--font-size-3xl);font-weight:800;margin-bottom:0.5rem">Order Confirmed</h1>
      <p style="color:var(--color-text-muted)">Thank you for your purchase. We are preparing your items for delivery.</p>
    </div>

    <div class="card" style="padding:1.5rem;margin-bottom:1.5rem">
      <h2 style="font-size:var(--font-size-sm);font-weight:700;margin-bottom:1rem;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.05em">Order Details</h2>
      <div id="confirmation-details">
        <div style="color:var(--color-text-muted)">Loading...</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:2rem">
      <div style="background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:1.25rem;text-align:center">
        <div style="font-size:var(--font-size-sm);font-weight:600;margin-bottom:0.4rem">Status</div>
        <span class="badge badge-warning">Pending</span>
      </div>
      <div style="background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:1.25rem;text-align:center">
        <div style="font-size:var(--font-size-sm);font-weight:600;margin-bottom:0.4rem">Est. Delivery</div>
        <div style="font-size:0.875rem;color:var(--color-text-muted)">3–5 business days</div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:0.75rem">
      <a href="orders.html" class="btn btn-primary btn-full btn-lg">View Order History</a>
      <a href="index.html" class="btn btn-secondary btn-full btn-lg">Continue Shopping</a>
    </div>

  </div>
</div>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/orders.js"></script>
</body>
</html>
