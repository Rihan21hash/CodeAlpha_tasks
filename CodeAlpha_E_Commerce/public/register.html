<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — NexShop</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card animate-fade-in">
    <a href="index.html" class="auth-logo">
      <div class="logo-icon" style="font-size:14px;font-weight:700">NX</div>
      <span class="logo-text">Nex<span class="logo-accent">Shop</span></span>
    </a>
    <h2>Create Account</h2>
    <p class="auth-sub">Join thousands of happy shoppers — it's free</p>

    <form id="register-form" onsubmit="handleRegister(event)">
      <div style="display:flex;flex-direction:column;gap:1rem">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" for="firstName">First Name</label>
            <input id="firstName" name="firstName" class="form-input" placeholder="Jane" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="lastName">Last Name</label>
            <input id="lastName" name="lastName" class="form-input" placeholder="Doe" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input id="email" name="email" type="email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input id="password" name="password" type="password" class="form-input" placeholder="Min. 6 characters" autocomplete="new-password" required minlength="6" oninput="checkPasswordMatch()">
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input id="confirmPassword" name="confirmPassword" type="password" class="form-input" placeholder="Repeat password" autocomplete="new-password" required oninput="checkPasswordMatch()">
          <span id="pwd-match-hint" style="font-size:0.75rem;margin-top:2px"></span>
        </div>
        <div style="font-size:0.75rem;color:var(--color-text-muted)">
          By creating an account, you agree to our <a href="#" style="color:var(--color-primary-light)">Terms of Service</a> and <a href="#" style="color:var(--color-primary-light)">Privacy Policy</a>.
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg">
          Create Account
        </button>
      </div>
    </form>

    <div class="auth-switch">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>
  redirectIfLoggedIn();
  function checkPasswordMatch() {
    const pwd = document.getElementById('password').value;
    const conf = document.getElementById('confirmPassword').value;
    const hint = document.getElementById('pwd-match-hint');
    if (!conf) { hint.textContent = ''; return; }
    if (pwd === conf) {
      hint.textContent = 'Passwords match';
      hint.style.color = 'var(--color-success)';
    } else {
      hint.textContent = 'Passwords do not match';
      hint.style.color = 'var(--color-error)';
    }
  }
</script>
</body>
</html>
