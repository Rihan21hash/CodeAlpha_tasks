<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Detail — NexShop</title>
  <meta name="description" content="View product details and add to cart on NexShop.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon" style="font-size:14px;font-weight:700">NX</div>
      <span class="logo-text">Nex<span class="logo-accent">Shop</span></span>
    </a>
    <div class="nav-search">
      <span class="search-icon" style="font-size:13px">&#x2315;</span>
      <input type="text" placeholder="Search products…" onkeydown="if(event.key==='Enter') window.location.href=window.getAppPath('/index.html?q='+this.value)">
    </div>
    <div class="nav-links">
      <div id="nav-auth-area" style="display:flex;align-items:center;gap:0.5rem"></div>
      <a href="cart.html" class="nav-cart-btn">
        Cart <span class="cart-badge" style="display:none">0</span>
      </a>
    </div>
  </div>
</nav>

<div class="page-wrapper">
  <div class="container" style="padding-top:2rem">

    <div class="breadcrumb">
      <a href="index.html">Home</a>
      <span class="sep">›</span>
      <a href="index.html">Products</a>
      <span class="sep">›</span>
      <span id="breadcrumb-name">Loading...</span>
    </div>

    <div class="product-detail-layout" id="product-detail">
      <div class="skeleton" style="height:400px;border-radius:var(--radius-xl)"></div>
      <div style="display:flex;flex-direction:column;gap:1rem">
        <div class="skeleton skeleton-line" style="height:20px;width:40%"></div>
        <div class="skeleton skeleton-line" style="height:36px"></div>
        <div class="skeleton skeleton-line" style="height:80px"></div>
      </div>
    </div>

    <div style="margin-top:4rem">
      <div class="section-header">
        <h2 class="section-title">You May Also Like</h2>
      </div>
      <div class="product-grid" id="related-grid"></div>
    </div>

  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <span>&copy; 2026 NexShop. All rights reserved.</span>
    </div>
  </div>
</footer>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
  let productData = null;
  let selectedQty = 1;

  async function loadProduct() {
    const id = getParam('id');
    if (!id) { window.location.href = window.getAppPath('/index.html'); return; }
    try {
      const { product } = await api.get(`/products/${id}`);
      productData = product;
      renderProduct(product);
      loadRelated(product.category, product.id);
      document.title = `${product.name} — NexShop`;
    } catch (err) {
      document.getElementById('product-detail').innerHTML =
        `<div class="empty-state" style="grid-column:1/-1"><h3>Product not found</h3><a href="index.html" class="btn btn-primary">Back to Shop</a></div>`;
    }
  }

  function renderProduct(p) {
    const inStock = p.stockQuantity > 0;
    document.getElementById('breadcrumb-name').textContent = p.name;
    document.getElementById('product-detail').innerHTML = `
      <div class="product-detail-image">
        <img src="${p.imageUrl || 'https://picsum.photos/seed/' + p.id + '/800/600'}" alt="${p.name}">
      </div>
      <div class="product-detail-info">
        <div>
          <span class="badge badge-primary" style="margin-bottom:0.75rem">${p.category || ''}</span>
          <h1 style="font-size:var(--font-size-3xl);font-weight:800;letter-spacing:-1px;margin-bottom:0.5rem">${p.name}</h1>
          <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem">
            ${renderStars(p.rating || 4)}
            <span style="color:var(--color-text-muted);font-size:0.875rem">${p.rating || 4.0} (${p.reviewCount || 0} reviews)</span>
          </div>
          <div style="font-size:0.75rem;color:var(--color-text-muted)">SKU: ${p.sku || 'N/A'}</div>
        </div>
        <div class="product-detail-price">${formatCurrency(p.price)}</div>
        <div class="${inStock ? 'stock-badge-in' : 'stock-badge-out'}">
          ${inStock ? 'In Stock (' + p.stockQuantity + ' available)' : 'Out of Stock'}
        </div>
        <p style="color:var(--color-text-muted);line-height:1.7">${p.description || ''}</p>
        <div style="display:flex;align-items:center;gap:1rem">
          <div class="qty-selector">
            <button class="qty-selector-btn" onclick="changeQty(-1)">&#8722;</button>
            <span class="qty-selector-val" id="qty-val">1</span>
            <button class="qty-selector-btn" onclick="changeQty(1)">&#43;</button>
          </div>
          <button class="btn btn-primary btn-lg" style="flex:1" onclick="addToCart()" ${!inStock ? 'disabled' : ''} id="atc-btn">
            Add to Cart
          </button>
        </div>
        <a href="cart.html" class="btn btn-secondary btn-full">View Cart</a>
      </div>`;
  }

  function changeQty(delta) {
    selectedQty = Math.max(1, Math.min(productData?.stockQuantity || 99, selectedQty + delta));
    document.getElementById('qty-val').textContent = selectedQty;
  }

  async function addToCart() {
    const btn = document.getElementById('atc-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';
    try {
      await api.post('/cart', { productId: productData.id, quantity: selectedQty });
      showToast(`${productData.name} added to cart`, 'success');
      updateCartBadge();
    } catch (err) {
      showToast(err.message || 'Could not add to cart', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Add to Cart';
    }
  }

  async function loadRelated(category, excludeId) {
    try {
      const { products } = await api.get(`/products?category=${encodeURIComponent(category)}&limit=4`);
      const related = products.filter(p => p.id !== parseInt(excludeId)).slice(0, 4);
      const grid = document.getElementById('related-grid');
      if (!related.length || !grid) return;
      grid.innerHTML = related.map(p => `
        <div class="card product-card" onclick="window.location.href=window.getAppPath('/product.html?id=${p.id}')">
          <div class="product-card-image">
            <img src="${p.imageUrl || 'https://picsum.photos/seed/' + p.id + '/600/400'}" alt="${p.name}" loading="lazy">
          </div>
          <div class="product-card-body">
            <div class="product-card-name">${p.name}</div>
          </div>
          <div class="product-card-footer">
            <div class="product-price">${formatCurrency(p.price)}</div>
          </div>
        </div>`).join('');
    } catch {}
  }

  setupNav();
  loadProduct();
</script>
</body>
</html>
