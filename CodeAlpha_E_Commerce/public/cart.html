<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart — NexShop</title>
  <meta name="description" content="Review your cart and proceed to checkout on NexShop.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon" style="font-size:14px;font-weight:700">NX</div>
      <span class="logo-text">Nex<span class="logo-accent">Shop</span></span>
    </a>
    <div class="nav-links">
      <div id="nav-auth-area" style="display:flex;align-items:center;gap:0.5rem"></div>
      <a href="cart.html" class="nav-cart-btn active">
        Cart <span class="cart-badge" style="display:none">0</span>
      </a>
    </div>
  </div>
</nav>

<div class="page-wrapper">
  <div class="container">
    <div class="page-header">
      <div class="breadcrumb"><a href="index.html">Home</a><span class="sep">›</span><span>Cart</span></div>
      <h1 class="page-title">Shopping Cart</h1>
    </div>

    <div class="cart-layout">
      <div>
        <div id="cart-items" style="display:flex;flex-direction:column;gap:1rem"></div>
        <div style="margin-top:1.5rem">
          <a href="index.html" class="btn btn-ghost">&#8592; Continue Shopping</a>
        </div>
      </div>

      <div class="order-summary">
        <h3>Order Summary</h3>
        <div class="summary-line">
          <span class="label">Subtotal</span>
          <span id="summary-subtotal">—</span>
        </div>
        <div class="summary-line">
          <span class="label">Shipping</span>
          <span id="summary-shipping">—</span>
        </div>
        <div class="summary-line">
          <span class="label">Tax (8%)</span>
          <span id="summary-tax">—</span>
        </div>
        <div class="summary-line" style="border-top:1px solid var(--color-border);padding-top:1rem;margin-top:0.5rem">
          <span class="summary-total">Total</span>
          <span class="summary-total" id="summary-total">—</span>
        </div>
        <div id="shipping-note" style="font-size:0.75rem;color:var(--color-primary-light);margin-top:0.5rem;text-align:center"></div>
        <button class="btn btn-primary btn-full btn-lg" style="margin-top:1.5rem" id="checkout-btn" onclick="goToCheckout()" disabled>
          Proceed to Checkout
        </button>
        <div style="display:flex;align-items:center;justify-content:center;gap:0.5rem;margin-top:1rem;font-size:0.75rem;color:var(--color-text-muted)">
          Secure SSL Checkout
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/cart.js"></script>
</body>
</html>
